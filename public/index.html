<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="description" content="A new category to rank into tiers every day — then argue about it." />
  <title>sabcdef</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://esm.sh" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    // Apply a saved theme override before first paint to avoid a flash.
    // (Mirrors the logic in app.js; with no override the CSS follows the OS.)
    (function () {
      try {
        var t = JSON.parse(localStorage.getItem("sabcdef:theme"));
        if (t === "light" || t === "dark") {
          document.documentElement.dataset.theme = t;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.content = t === "light" ? "#f6f7f9" : "#0f1115";
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="app-header">
    <div class="wrap">
      <div class="brand">
        <span class="brand-mark">S</span>
        <span class="brand-name">sabcdef</span>
      </div>
      <div class="today-meta">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">🌙</button>
        <span id="today-date" class="today-date">—</span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="category-head">
      <h1 id="category-name">Loading today's category…</h1>
      <p id="category-blurb" class="blurb"></p>
    </section>

    <!-- Tier list -->
    <section class="tierlist" aria-label="Tier list">
      <div class="tierlist-toolbar">
        <span class="hint">Drag items into a tier — or tap one to pick. Saved on this device automatically.</span>
        <div class="toolbar-actions">
          <button id="share-btn" class="btn btn-ghost" type="button">Copy ranking</button>
          <button id="reset-btn" class="btn btn-ghost" type="button">Reset</button>
        </div>
      </div>

      <div id="tiers" class="tiers"></div>

      <div class="pool-wrap">
        <div class="pool-label">Unranked</div>
        <div id="pool" class="pool tier-dropzone" data-tier="pool"></div>
      </div>
    </section>

    <!-- Forum -->
    <section class="forum" aria-label="Discussion">
      <div class="forum-head">
        <h2>Discussion <span id="comment-count" class="count">0</span></h2>
        <div class="sort-toggle" role="tablist" aria-label="Sort comments">
          <button class="sort-opt is-active" data-sort="top" role="tab">Top</button>
          <button class="sort-opt" data-sort="new" role="tab">New</button>
        </div>
      </div>

      <form id="comment-form" class="composer">
        <input
          id="author-input"
          class="author-input"
          type="text"
          maxlength="32"
          placeholder="Display name (optional)"
          autocomplete="nickname"
        />
        <textarea
          id="body-input"
          class="body-input"
          maxlength="4000"
          rows="3"
          placeholder="Defend your placements…"
          required
        ></textarea>
        <div class="composer-actions">
          <span id="composer-error" class="error" role="alert"></span>
          <button class="btn btn-primary" type="submit">Post</button>
        </div>
      </form>

      <div id="comments" class="comments"></div>
      <p id="comments-empty" class="empty" hidden>No comments yet. Start the debate.</p>
    </section>
  </main>

  <footer class="app-footer">
    <div class="wrap">New category every day · rankings saved locally</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
